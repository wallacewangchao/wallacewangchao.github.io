<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reachy Mini Quest Teleop</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/sub-page.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QZ8WNGYXYL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-QZ8WNGYXYL');
  </script>

  <style>
    body {
      background: #ffffff;
      color-scheme: light;
    }

    main.reachy-readme-page {
      background: #ffffff;
      margin: 0 auto;
      max-width: 980px;
      min-height: 100%;
      padding: 2.5rem 1.5rem 4rem;
    }

    .readme-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid #d8dee4;
      padding-bottom: 1rem;
    }

    .readme-header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .github-link {
      flex: 0 0 auto;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      color: #24292f;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 0.5rem 0.75rem;
      text-decoration: none;
    }

    .github-link:hover {
      background: #f6f8fa;
    }

    .markdown-body {
      background: #ffffff;
      box-sizing: border-box;
      color: #24292f;
      font-family: Roboto, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6,
    .markdown-body p,
    .markdown-body li,
    .markdown-body table {
      color: #24292f;
    }

    .markdown-body pre,
    .markdown-body code {
      background-color: #f6f8fa;
      color: #24292f;
    }

    .markdown-body pre code {
      background-color: transparent;
    }

    .markdown-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 1rem auto;
    }

    .markdown-body pre {
      overflow-x: auto;
    }

    .readme-status {
      border: 1px solid #d0d7de;
      border-radius: 6px;
      color: #57606a;
      margin-top: 2rem;
      padding: 1rem;
    }

    @media screen and (max-width: 700px) {
      main.reachy-readme-page {
        padding: 1.5rem 1rem 3rem;
      }

      .readme-header {
        flex-direction: column;
      }

      .github-link {
        align-self: flex-start;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>
  <main class="reachy-readme-page">
    <header class="readme-header">
      <h1>Reachy Mini Quest Teleop</h1>
      <a class="github-link" href="https://github.com/HRI-EU/reachy-vr-quest" target="_blank" rel="noopener">GitHub</a>
    </header>

    <article id="readme-content" class="markdown-body">
      <div class="readme-status">Loading README...</div>
    </article>
  </main>

  <script>
    const REPO_URL = 'https://github.com/HRI-EU/reachy-vr-quest';
    const RAW_README_URL = 'https://raw.githubusercontent.com/HRI-EU/reachy-vr-quest/main/README.md';
    const RAW_BASE_URL = 'https://raw.githubusercontent.com/HRI-EU/reachy-vr-quest/main/';
    const BLOB_BASE_URL = 'https://github.com/HRI-EU/reachy-vr-quest/blob/main/';

    const readmeContent = document.getElementById('readme-content');

    function isAbsoluteOrSpecialUrl(url) {
      return /^(?:[a-z][a-z0-9+.-]*:|#)/i.test(url);
    }

    function resolveRepoUrl(url, baseUrl) {
      if (!url || isAbsoluteOrSpecialUrl(url)) return url;
      const normalizedUrl = url.replace(/^\/+/, '');
      return new URL(normalizedUrl, baseUrl).href;
    }

    function rewriteReadmeUrls(container) {
      container.querySelectorAll('a[href]').forEach((link) => {
        link.href = resolveRepoUrl(link.getAttribute('href'), BLOB_BASE_URL);
        link.target = '_blank';
        link.rel = 'noopener';
      });

      container.querySelectorAll('img[src]').forEach((image) => {
        image.src = resolveRepoUrl(image.getAttribute('src'), RAW_BASE_URL);
      });
    }

    function showFallback(error) {
      console.error('Could not load Reachy README:', error);
      readmeContent.innerHTML = `
        <div class="readme-status">
          README could not be loaded here. Please open the
          <a href="${REPO_URL}" target="_blank" rel="noopener">GitHub repository</a>.
        </div>
      `;
    }

    async function loadReadme() {
      try {
        if (!window.marked || !window.DOMPurify) {
          throw new Error('Markdown renderer libraries are unavailable.');
        }

        const response = await fetch(RAW_README_URL);
        if (!response.ok) {
          throw new Error(`README request failed with ${response.status}`);
        }

        const markdown = await response.text();
        const renderedHtml = marked.parse(markdown);
        readmeContent.innerHTML = DOMPurify.sanitize(renderedHtml);
        rewriteReadmeUrls(readmeContent);
      } catch (error) {
        showFallback(error);
      }
    }

    loadReadme();
  </script>
</body>
</html>
